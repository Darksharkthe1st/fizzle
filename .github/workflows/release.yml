name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run publish -- --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run publish -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run publish -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  finalize:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-mac]
    steps:
      - name: Write release notes
        run: |
          VERSION="${{ github.ref_name }}"
          V="${VERSION#v}"
          gh release edit "$VERSION" \
            --repo Darksharkthe1st/fizzle \
            --notes "## Downloads

| Platform | File |
|----------|------|
| **Windows** | \`Fizzle Setup ${V}.exe\` |
| **macOS (Apple Silicon)** | \`Fizzle-${V}-arm64.dmg\` |
| **macOS (Intel)** | \`Fizzle-${V}-x64.dmg\` |
| **Linux** | \`Fizzle-${V}.AppImage\` |"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
