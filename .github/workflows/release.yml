name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run publish -- --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run publish -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run publish -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  finalize:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-mac]
    steps:
      - name: Write release notes
        run: |
          VERSION="${{ github.ref_name }}"
          V="${VERSION#v}"
          {
            echo "## Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| **Windows** | \`Fizzle Setup ${V}.exe\` |"
            echo "| **macOS (Apple Silicon)** | \`Fizzle-${V}-arm64.dmg\` |"
            echo "| **macOS (Intel)** | \`Fizzle-${V}-x64.dmg\` |"
            echo "| **Linux** | \`Fizzle-${V}.AppImage\` |"
          } > /tmp/notes.md
          gh release edit "$VERSION" \
            --repo Darksharkthe1st/fizzle \
            --notes-file /tmp/notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
