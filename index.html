<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fizzle — design avenues</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Caveat:wght@500;600;700&family=Bricolage+Grotesque:opsz,wght@10..48,500;10..48,600;10..48,700;10..48,800&family=Schibsted+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { height: 100vh; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--fz-paper2, #ffe6a8); border-left: 2.5px solid var(--fz-ink, #1a1108); }
  ::-webkit-scrollbar-thumb { background: var(--fz-ink, #1a1108); }
  ::-webkit-scrollbar-thumb:hover { opacity: 0.75; }
  ::-webkit-scrollbar-corner { background: var(--fz-paper2, #ffe6a8); }
  /* shared keyframes used across all avenues */
  @keyframes ember-flicker { 0%, 100% { opacity: .9; transform: scale(1); } 50% { opacity: 1; transform: scale(1.25); } }
  @keyframes ember-glow    { 0%, 100% { filter: drop-shadow(0 0 3px currentColor); } 50% { filter: drop-shadow(0 0 8px currentColor); } }
  @keyframes spark-fly     { 0% { opacity: 1; transform: translate(0,0); } 100% { opacity: 0; transform: translate(8px, -10px); } }
  @keyframes stripe-flow   { from { background-position: 0 0; } to { background-position: -28px 0; } }
  @keyframes shake-overdue { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-1px); } 75% { transform: translateX(1px); } }
  @keyframes pop-in        { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes spark-pulse   { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.18) rotate(22deg); } }
  @keyframes stamp-in      { 0% { transform: rotate(-10deg) scale(2.4); opacity: 0; } 55% { transform: rotate(-10deg) scale(.88); opacity: 1; } 100% { transform: rotate(-10deg) scale(1); } }
  @keyframes scissor-snip  { 0% { transform: translate(20px, 0) rotate(20deg) scale(.6); opacity: 0; } 35% { transform: translate(0,0) rotate(0deg) scale(1.15); opacity: 1; } 60% { transform: translate(0,0) rotate(-15deg) scale(1); } 100% { transform: translate(-6px,2px) rotate(-20deg) scale(.95); opacity: 1; } }
  @keyframes modal-in      { from { opacity: 0; transform: scale(.94) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes backdrop-in   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes row-expand    { from { max-height: 0; opacity: 0; padding-top:0; padding-bottom:0;} to { max-height: 220px; opacity: 1; } }
  @keyframes confetti-burst{ 0% { transform: translate(0,0) rotate(0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translate(var(--cx), var(--cy)) rotate(var(--r,180deg)); opacity: 0; } }
  @keyframes fuse-retract  { to { width: 0; } }
  @keyframes bomb-fade-out { 0%, 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.25); } }
  @keyframes explosion-pop { 0% { opacity: 0; transform: scale(.3) rotate(-15deg); } 35% { opacity: 1; transform: scale(1.45) rotate(10deg); } 65% { opacity: 1; transform: scale(1.1) rotate(-2deg); } 100% { opacity: 0; transform: scale(1.55) rotate(6deg); } }
  @keyframes fade-out-soft { to { opacity: 0; } }

  /* ── Habits avenue keyframes ── */
  @keyframes flame-flicker {
    0%,100% { transform: scaleX(1)    scaleY(1)    rotate(0deg);    }
    20%      { transform: scaleX(.91)  scaleY(1.07) rotate(-2.5deg); }
    40%      { transform: scaleX(1.06) scaleY(.94)  rotate(1.5deg);  }
    60%      { transform: scaleX(.96)  scaleY(1.05) rotate(-1deg);   }
    80%      { transform: scaleX(1.05) scaleY(.96)  rotate(2.5deg);  }
  }
  @keyframes taper-tilt {
    0%   { transform: translateX(0px)  rotate(0deg);   }
    22%  { transform: translateX(22px) rotate(0deg);   }
    48%  { transform: translateX(24px) rotate(-50deg); }
    68%  { transform: translateX(24px) rotate(-50deg); }
    88%  { transform: translateX(10px) rotate(0deg);   }
    100% { transform: translateX(0px)  rotate(0deg);   }
  }
  @keyframes bomb-pop {
    0%   { transform: scale(.65); opacity: 0; }
    55%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1);   opacity: 1; }
  }
  @keyframes empty-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes fade-in    { from { opacity: 0; } to { opacity: 1; } }

  /* ── Habits: flame animation classes ── */
  .flame-tiny   { transform-box: fill-box; transform-origin: 50% 100%; animation: flame-flicker 2.2s ease-in-out infinite; }
  .flicker      { transform-box: fill-box; transform-origin: 50% 90%;  animation: flame-flicker 1.9s ease-in-out infinite; }
  .flicker-slow { transform-box: fill-box; transform-origin: 50% 90%;  animation: flame-flicker 2.6s ease-in-out infinite; }

  /* ── Habits: taper candle ── */
  .taper-col { position: relative; display: flex; justify-content: center; }
  .taper-col.logging { animation: taper-tilt 1.9s cubic-bezier(.4,1,.5,1) forwards; transform-origin: bottom center; }

  /* ── Habits: bomb chain ── */
  .bomb-col          { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .bomb-col.just-lit { animation: bomb-pop .38s cubic-bezier(.34,1.56,.64,1) both; }
  .day-lbl           { font-family: "Geist Mono", ui-monospace, monospace; font-size: 7.5px; font-weight: 700; letter-spacing: .06em; color: var(--fz-ink3, rgba(255,233,181,.38)); margin-top: 3px; text-transform: uppercase; }

  /* ── Habits: fuse segments ── */
  .fuse-seg     { height: 10px; flex: 1; border-radius: 3px; align-self: center; min-width: 0; }
  .fuse-done    { background: repeating-linear-gradient(115deg,rgba(58,168,74,.55) 0 5px,transparent 5px 10px),rgba(58,168,74,.15); background-size: 24px 100%,100% 100%; border: 1.5px solid rgba(58,168,74,.7); animation: stripe-flow 1.6s linear infinite; }
  .fuse-burned  { background: #1a1108; border: 1.5px solid var(--fz-rule, rgba(255,233,181,.18)); }
  .fuse-burning { background: repeating-linear-gradient(115deg,#f0a821 0 6px,transparent 6px 10px),rgba(240,168,33,.22); background-size: 28px 100%,100% 100%; border: 1.5px solid var(--fz-ink, #ffe9b5); animation: stripe-flow .9s linear infinite; }
  .fuse-broken  { background: rgba(229,57,53,.1); border: 2px dashed rgba(229,57,53,.75); }
  .fuse-unlit   { background: #06040b; border: 1.5px solid var(--fz-rule, rgba(255,233,181,.14)); }
  .chain        { display: flex; align-items: center; width: 100%; padding: 4px 0 0; }

  /* ── Habits: rows ── */
  .habit-row    { display: grid; grid-template-columns: 52px 180px 1fr 90px; gap: 14px; align-items: center; padding: 13px 22px; border-bottom: 2px solid var(--fz-rule, rgba(255,233,181,.14)); transition: background .12s; }
  .habit-row:hover { background: rgba(255,255,255,.04); }
  .habit-row:last-child { border-bottom: none; }
  .habit-name   { font-size: 15px; font-weight: 700; letter-spacing: -.01em; line-height: 1.2; }
  .habit-streak { font-family: "Geist Mono", ui-monospace, monospace; font-size: 9px; color: var(--fz-ink3, rgba(255,233,181,.38)); letter-spacing: .06em; margin-top: 3px; }

  /* ── Habits: log button ── */
  .log-btn           { display: inline-flex; align-items: center; justify-content: center; height: 28px; padding: 0 10px; border-radius: 14px; background: transparent; border: 2px solid currentColor; font-family: "Bricolage Grotesque", system-ui, sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; box-shadow: 2px 2px 0 currentColor; white-space: nowrap; width: 100%; transition: transform .1s, box-shadow .1s; color: var(--fz-ink, #ffe9b5); }
  .log-btn:hover:not(:disabled)  { transform: translate(1px,1px); box-shadow: 1px 1px 0 currentColor; }
  .log-btn:active:not(:disabled) { transform: translate(2px,2px); box-shadow: none; }
  .log-btn:disabled  { opacity: .4; cursor: default; }
  .log-btn.done-state { color: #3aa84a; opacity: .85; cursor: default; }
  .log-btn.done-state:hover { transform: none !important; }

  /* ── Habits: spare fuse tokens ── */
  .blade-charged { filter: drop-shadow(0 0 5px rgba(58,168,74,.7)); }
  .blade-spent   { opacity: .35; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="avenue-fuze.jsx"></script>
<script type="text/babel" src="fz-settings.jsx"></script>
<script type="text/babel" src="avenue-habits.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
